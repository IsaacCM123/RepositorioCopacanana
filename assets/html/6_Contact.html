<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Casa de Huespedes Copacabana</title>
		<link rel="icon" href="./../img/icon.png">

		<!--Estilo de texto Montserrat-->
		<link rel="preconnect"href="https://fonts.googleapis.com">
		<link rel="preconnect"href="https://fonts.gstatic.com"crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit&display=swap"rel="stylesheet">

		<link rel="stylesheet" href="../css/2_Header.css">
		<link rel="stylesheet" href="../css/8_FooterComponenteReutilizable.css">
		<link rel="stylesheet" href="../css/12_Contacto.css">
	</head>
	<body>
		<header id="headerID">
			<div class="divlogoCLASS">
				<img src="./../img/logo.png">
				<div class="divNomEmpCLASS">
					<h4 class="tituloCLASS">COPACABANA</h4><p class="subtituloCLASS">Casa de Huéspedes</p>
				</div>
			</div>

			<ion-icon id="iconoSolID" name="sunny-sharp"></ion-icon>

			<input type="checkbox" id="movilID">
			<label for="movilID" id="labelID">
				<ion-icon name="reorder-three-sharp" id="burgerIconID" onclick="cambiar()"></ion-icon>
			</label>
			<nav id="navegacionID">
				<a href="../../index.html">Inicio</a>
				<a href="3_Portfolio.html">Portafolio</a>
				<a href="4_Services.html">Servicios</a>
				<a href="5_Blogs.html">Blogs</a>
				<a href="6_Contact.html"class="active">Contactos</a>
			</nav>
		</header>

		<section id="contactoCuerpoID"><!--Contacto se insertará aquí con 11_Contacto.JS--></section>

		<footer id="footerID"><!--El footer será insertado aquí con JS.--></footer>

		<script type="module"src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
		<script src="../script/3_ModoOscuroClaroBody.js"></script>
		<script src="..//script/4_AmburguesaAnimada.js"></script>
		<script src="../script/7_FooterComponenteReutilizable.js"></script>
		<script src="../script/11_Contacto.js"></script>
		<script src="https://unpkg.com/scrollreveal"></script>
		<script>
			ScrollReveal({
			  reset: true,
			  distance: '200px',
			  duration: 2000,
			  delay: 0
			});

			ScrollReveal().reveal('.MovScroll1', { delay: 400, origin: 'right' })
			ScrollReveal().reveal('.MovScroll2', { delay: 500, origin: 'right' })
			ScrollReveal().reveal('.MovScroll3', { delay: 600, origin: 'right' })
			ScrollReveal().reveal('.MovScroll4', { delay: 700, origin: 'right' })

			// Definir el tama;o Movil (ej. Menores a 790px)
			const anchoMovil = window.matchMedia('(max-width: 790px)')
			function cambiarModoMovil(e) {
			  if (e.matches){
			    // Código para pantallas móviles/tablets
			    ScrollReveal().reveal('.MovScroll1', { delay: 400, origin: 'top' })
				ScrollReveal().reveal('.MovScroll2', { delay: 500, origin: 'bottom' })
				ScrollReveal().reveal('.MovScroll3', { delay: 600, origin: 'top' })
				ScrollReveal().reveal('.MovScroll4', { delay: 700, origin: 'bottom' })
			  }
			}
			// Ejecutar al cargar la página por primera vez
			cambiarModoMovil(anchoMovil)
		</script>
	</body>
</html>
